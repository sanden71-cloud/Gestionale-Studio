<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Landing – Le tue app</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 2rem;
    }
    h1 { font-size: 1.5rem; color: #94a3b8; font-weight: 500; }
    .pulsanti { display: flex; flex-direction: column; gap: 1rem; width: 100%; max-width: 320px; }
    .pulsanti button {
      display: block;
      width: 100%;
      padding: 1.25rem 1.5rem;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.2s;
    }
    .pulsanti button:hover { filter: brightness(1.1); }
    .btn1 { background: #22c55e; color: #022c22; }
    .btn2 { background: #3b82f6; color: #fff; }
    .nota { font-size: 0.85rem; color: #64748b; text-align: center; max-width: 320px; }
  </style>
</head>
<body>
  <h1>Scegli l’app da aprire</h1>
  <div class="pulsanti">
    <button type="button" class="btn1" data-url="http://127.0.0.1:8501">1 – App Pagamenti (porta 8501)</button>
    <button type="button" class="btn2" data-url="http://127.0.0.1:8502">2 – Gestione Pazienti e Diete (porta 8502)</button>
  </div>
  <p class="nota">Prima avvia l’app con doppio clic sul file .command (nella cartella GitHub).</p>

  <script>
    document.querySelectorAll('.pulsanti button').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var url = this.getAttribute('data-url');
        window.open(url, '_blank');
      });
    });
  </script>
</body>
</html>
